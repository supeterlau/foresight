services:
  # ─── 单实例服务：Caddy 反向代理 + Python 后端 ─────────────
  - type: web
    name: foresight
    runtime: docker
    repo: https://github.com/supeterlau/gh-peter
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GITLAB_CLIENT_ID
        sync: false
      - key: GITLAB_CLIENT_SECRET
        sync: false
      - key: GITLAB_PRIVATE_TOKEN
        sync: false
      # 不再需要 CORS_ORIGINS 和 VITE_API_URL —— 同源部署
